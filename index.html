<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Togdheere General Trading & Logistics Co.</title>
    <style>
        /* 🎨 Nidaamka Midabada iyo Deegaanka Guud */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c20, #060411); /* 🌌 Deep Navy/Purple Gradient */
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 🗺️ Menu-ga Sare (Navigation Bar) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(15, 12, 32, 0.7);
            backdrop-filter: blur(10px); /* ✨ Glassmorphic overlay */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo span {
            color: #00f2fe; /* 🔵 Neon Cyan Blue */
        }

        nav a {
            color: #a0a5c0;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            color: #00f2fe;
            text-shadow: 0 0 10px #00f2fe;
        }

        /* 🎬 Qaybta Sare ee Cinematic-ga ah (Hero Section) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 0 10% ;
            background: radial-gradient(circle at 80% 50%, rgba(111, 0, 255, 0.15), transparent 50%);
        }

        .hero h1 {
            font-size: 3.5rem;
            max-width: 800px;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero h1 span {
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: #a0a5c0;
            max-width: 600px;
            margin-bottom: 40px;
        }

        /* 🔘 Badhamada Waxqabadka (Buttons) */
        .btn-container {
            display: flex;
            gap: 20px;
        }

        .btn-primary {
            background: #00f2fe;
            color: #060411;
            padding: 15px 35px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.7);
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            padding: 15px 35px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #00f2fe;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TOGDHEERE<span>.</span></div>
        <nav>
            <a href="#" class="active">Home</a>
            <a href="#">Services</a>
            <a href="#">Projects</a>
            <a href="#">News</a>
            <a href="#">Dashboard</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Global Logistics & General Trading <span>Elevated</span></h1>
        <p>Waxaan isku xirnaa ganacsiyada caalamka anagoo bixina adeegyo hufan oo dhanka saadka, dhoofinta, iyo kaabayaasha dhaqaalaha ah.</p>
        <div class="btn-container">
            <button class="btn-primary">Explore Services</button>
            <button class="btn-secondary">Go to Dashboard</button>
        </div>
    </section>

</body>
</html>
